
services:
  backend:
    build: ./backend
    volumes:
      - ./backend/app:/app/backend/app   # mount app code for hot reload
      - ./backend/data:/data   # persistence for JSON file
      - ./backend/.secrets:/app/backend/.secrets:ro   # mount credentials file
      - ./backend/logs:/app/backend/logs   # persist external access logs
      - ./VERSION:/app/VERSION:ro   # mount version file
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "0.0.0.0:8000:8000"  # Explicitly bind to all interfaces for external access
    networks:
      - music-inventory-net

  frontend:
    build: ./frontend
    depends_on: [backend]
    environment:
      - VITE_API_URL=http://backend:8000
      - VIRTUAL_HOST=localhost,10.19.71.122
      - VIRTUAL_PORT=80
    ports:
      - "0.0.0.0:5173:80"  # Explicitly bind to all interfaces
    networks:
      - music-inventory-net

  public-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile-public
    depends_on: [backend]
    ports:
      - "0.0.0.0:9000:80"  # Explicitly bind to all interfaces
    networks:
      - music-inventory-net

  nginx-proxy:
    image: jwilder/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "0.0.0.0:8080:80"  # Explicitly bind to all interfaces
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - music-inventory-net

  file-watcher:
    build:
      context: .
      dockerfile: Dockerfile.watcher
    container_name: file-watcher
    volumes:
      - .:/workspace  # Mount entire project
      - /var/run/docker.sock:/var/run/docker.sock  # Access to Docker daemon
    restart: unless-stopped
    depends_on:
      - public-frontend
    networks:
      - music-inventory-net

networks:
  music-inventory-net:
    driver: bridge


